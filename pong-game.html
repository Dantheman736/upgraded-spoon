<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body { margin: 0; }
        canvas { background: #000; display: block; margin: auto; }
        #scoreboard { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); color: white; font-size: 24px; }
    </style>
</head>
<body>
    <canvas id="pong" width="800" height="400"></canvas>
    <div id="scoreboard">
        Player: <span id="playerScore">0</span> | AI: <span id="aiScore">0</span>
    </div>
    <script>
        const canvas = document.getElementById('pong');
        const context = canvas.getContext('2d');

        // Create the Pong paddle and ball
        const paddleWidth = 10, paddleHeight = 100;
        const player = { x: 0, y: (canvas.height - paddleHeight) / 2, width: paddleWidth, height: paddleHeight, color: 'WHITE', score: 0 };
        const ai = { x: canvas.width - paddleWidth, y: (canvas.height - paddleHeight) / 2, width: paddleWidth, height: paddleHeight, color: 'WHITE', score: 0 }; 
        const ball = { x: canvas.width / 2, y: canvas.height / 2, radius: 10, speed: 4, velocityX: 4, velocityY: 4, color: 'WHITE' };

        // Draw everything
        function draw() {
            // Clear the canvas
            context.clearRect(0, 0, canvas.width, canvas.height);

            // Draw paddles
            context.fillStyle = player.color;
            context.fillRect(player.x, player.y, player.width, player.height);

            context.fillStyle = ai.color;
            context.fillRect(ai.x, ai.y, ai.width, ai.height);

            // Draw ball
            context.fillStyle = ball.color;
            context.beginPath();
            context.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2, false);
            context.closePath();
            context.fill();

            // Update scoreboard
            document.getElementById('playerScore').textContent = player.score;
            document.getElementById('aiScore').textContent = ai.score;
        }

        // Update game objects
        function update() {
            ball.x += ball.velocityX;
            ball.y += ball.velocityY;

            // Ball collision with top and bottom walls
            if (ball.y + ball.radius >= canvas.height || ball.y - ball.radius <= 0) {
                ball.velocityY = -ball.velocityY;
            }

            // Ball collision with paddles
            let playerOrAI = (ball.x < canvas.width / 2) ? player : ai;
            if (collision(ball, playerOrAI)) {
                ball.velocityX = -ball.velocityX;
            }

            // AI Movement
            ai.y += ((ball.y - (ai.y + ai.height / 2)) * 0.1);

            // Reset ball if out of bounds
            if (ball.x - ball.radius < 0) {
                ai.score++;
                resetBall();
            } else if (ball.x + ball.radius > canvas.width) {
                player.score++;
                resetBall();
            }
        }

        function collision(ball, paddle) {
            ball.top = ball.y - ball.radius;
            ball.bottom = ball.y + ball.radius;
            ball.left = ball.x - ball.radius;
            ball.right = ball.x + ball.radius;

            paddle.top = paddle.y;
            paddle.bottom = paddle.y + paddle.height;
            paddle.left = paddle.x;
            paddle.right = paddle.x + paddle.width;

            return ball.left < paddle.right && ball.top < paddle.bottom && ball.right > paddle.left && ball.bottom > paddle.top;
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.velocityX = -ball.velocityX;
        }

        // Player controls
        document.addEventListener('mousemove', (event) => {
            let rect = canvas.getBoundingClientRect();
            player.y = event.clientY - rect.top - player.height / 2;
        });

        // Game loop
        function game() {
            draw();
            update();
            requestAnimationFrame(game);
        }

        // Start the game
        game();
    </script>
</body>
</html>
